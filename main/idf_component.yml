## Managed component dependencies for the OE voice-device firmware.
## Resolved by `idf.py reconfigure` or first build.

dependencies:
  idf:
    version: ">=5.4"

  ## TensorFlow Lite Micro + esp-nn kernels.
  ## Pinned per ESPHome's micro_wake_word component to keep the
  ## audio frontend / wake-word streaming model on a known-good combo.
  espressif/esp-tflite-micro:
    version: "1.3.3~1"
  espressif/esp-nn:
    version: "1.1.2"

  ## Audio frontend (windowing + 40-band mel + PCAN noise reduction +
  ## log scale → INT8 features). Apache 2.0, authored by Kevin Ahrendt
  ## (microWakeWord creator). Wraps TFLM's experimental microfrontend
  ## as a clean public API (FrontendConfig / FrontendProcessSamples).
  esphome/esp-micro-speech-features:
    version: "1.2.3"

  chmorgan/esp-libhelix-mp3:
    version: "~1.0.3"

  ## 1.7.0 added `enable_close_reconnect` flag in the config struct —
  ## required for WS auto-reconnect after the server sends a clean
  ## close-1001 frame (which OE does on graceful shutdown).
  espressif/esp_websocket_client:
    version: "~1.7.0"

  ## mDNS responder — required by the AirPlay receiver in
  ## components/airplay/ to advertise the _raop._tcp service to iOS
  ## controllers and to search _dacp._tcp for the remote-control side.
  espressif/mdns:
    version: "^1.4.0"
