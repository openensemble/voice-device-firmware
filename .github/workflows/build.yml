# CI build — every push/PR builds the full flashable artifact set with the
# same ESP-IDF version used for local development (v5.4; see BUILD.md).
# Managed components are fetched at configure time from the versions pinned
# in dependencies.lock.
name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ESP-IDF build (esp32s3)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32s3
          command: idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oe-voice-device-${{ github.sha }}
          path: |
            build/oe_voice_device.bin
            build/wakewords.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin
          if-no-files-found: error
